<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>注意事项</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: #f2f2f2;
            color: #000;
            line-height: 1.65;
            min-height: 100vh;
            padding-bottom: calc(env(safe-area-inset-bottom) + 30px);
            overflow-x: hidden;
        }

        .page {
            max-width: 440px;
            margin: 0 auto;
        }

        .page-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #fff;
            padding: 16px;
            text-align: center;
        }

        .page-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
        }

        .page-body {
            padding: 14px 16px 0;
        }

        /* 通用卡片 */
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: .88rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 10px;
        }

        .card p {
            font-size: .8rem;
            color: #000;
            font-weight: 400;
            margin-bottom: 8px;
            line-height: 1.75;
        }

        .card p:last-child {
            margin-bottom: 0
        }

        .card p strong {
            color: #000;
            font-weight: 700
        }

        /* 底部提示条 */
        .foot-note {
            margin-top: 16px;
            background: #fff;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: .78rem;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="page">

    <div class="page-header">
        <div class="page-title">注意事项</div>
    </div>

    <div class="page-body">
        <div class="card">
            <div class="card-title">视频列表</div>
            <p>只展示最近收藏的十条视频</p>
        </div>
        <div class="card">
            <div class="card-title">解密失败</div>
            <p>两次解密失败后大概率不会成功，可选择金币购买或放弃</p>
        </div>
        <div class="card">
            <div class="card-title">成功率</div>
            <p>新发布的视频解密成功率 <strong>&gt; 90%</strong>，发布时间越早成功率越低</p>
        </div>
        <div class="card">
            <div class="card-title">无权访问/一直加载</div>
            <p>进入一次<strong>优蓝APP</strong>即可解决</p>
        </div>
        <div class="card">
            <div class="card-title">存储规则</div>
            <p>解密成功或购买成功后<strong>不会自动保存</strong>，只有下载才会保存到本地，否则下次观看需重新解密或购买</p>
        </div>
        <div class="card">
            <div class="card-title">作者联系方式</div>
            <p>QQ：3565098969</p>
            <p>VX：qxqyywqx</p>
        </div>
        <div class="foot-note">重要内容记得下载到本地，避免重复操作</div>
    </div>

</div>

</body>
</html>
